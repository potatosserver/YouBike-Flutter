name: youbike
description: A professional YouBike station finder.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  shared_preferences: ^2.3.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  provider: ^6.1.1
  flutter_map: ^8.3.1

  latlong2: ^0.9.1
  http: ^1.2.2
  geolocator: ^14.0.3
  sliding_up_panel: ^2.0.0
  flutter_map_marker_cluster: ^8.2.2
  fluttertoast: ^9.1.0
  connectivity_plus: ^7.2.0
  go_router: ^17.3.0
  permission_handler: ^11.3.1
  package_info_plus: ^10.2.0
  device_info_plus: ^13.2.0
  path_provider: ^2.1.6
  dio: ^5.10.0
  open_filex: ^4.7.0
  url_launcher: ^6.2.6
  flutter_html: ^3.0.0-beta.2
  markdown: ^7.2.2
  crypto: ^3.0.7
  pub_semver: ^2.2.0
  in_app_update: ^5.0.0
  font_awesome_flutter: ^11.0.0

  # Firebase
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_messaging: ^16.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  assets:
    - assets/icons/
  generate: true
  uses-material-design: true