name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to release (e.g., v1.0.1)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Smart Update CHANGELOG.md
        run: |
          RAW_VERSION="${{ github.event.inputs.version }}"
          VERSION_NAME=$(echo "$RAW_VERSION" | sed 's/^[vV]//')
          if grep -q "## $VERSION_NAME" CHANGELOG.md; then
            echo "Changelog entry for $VERSION_NAME already exists. Skipping."
          else
            echo "Creating default changelog entry for $VERSION_NAME."
            TODAY=$(date +'%Y-%m-%d')
            echo -e "## $VERSION_NAME - $TODAY\n\n- 更新功能並修復了一些錯誤\n" > new_entry.txt
            head -n 1 CHANGELOG.md > header.txt || true
            tail -n +2 CHANGELOG.md > old_body.txt || true
            cat header.txt new_entry.txt old_body.txt > CHANGELOG.md
            rm new_entry.txt old_body.txt header.txt
          fi

      - name: Bump Version in pubspec.yaml
        run: |
          RAW_VERSION="${{ github.event.inputs.version }}"
          VERSION_NAME=$(echo "$RAW_VERSION" | sed 's/^[vV]//')
          CURRENT_BUILD=$(grep 'version:' pubspec.yaml | sed 's/.*+//')
          NEW_BUILD=$((CURRENT_BUILD + 1))
          NEW_VERSION="$VERSION_NAME+$NEW_BUILD"
          echo "Bumping version to $NEW_VERSION"
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

      - name: Commit and Push Changes
        run: |
          git add pubspec.yaml CHANGELOG.md
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): Release ${{ github.event.inputs.version }}"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate L10n
        run: flutter gen-l10n

      - name: Decode Keystore and Build
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 --decode > android/upload-keystore.jks
          echo "storeFile=upload-keystore.jks" > android/key.properties
          echo "keyAlias=${KEY_ALIAS}" >> android/key.properties
          echo "keyPassword=${KEY_PASSWORD}" >> android/key.properties
          echo "storePassword=${STORE_PASSWORD}" >> android/key.properties

          # 優先編譯 google_play flavor 的 AAB，隨後編譯 github flavor 的 APK
          flutter build appbundle --flavor google_play --obfuscate --split-debug-info=./build/app/outputs/debug-info --dart-define=UPDATE_CHANNEL=google_play
          flutter build apk --flavor github --split-per-abi --obfuscate --split-debug-info=./build/app/outputs/debug-info --dart-define=UPDATE_CHANNEL=github

      - name: Re-pull Latest CHANGELOG.md
        run: |
          git pull origin main
          echo "Re-pulled latest CHANGELOG.md to capture user edits during build."

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: YouBike-Release-AAB
          path: build/app/outputs/bundle/google_playRelease/app-google_play-release.aab
          if-no-files-found: warn
          retention-days: 7

      - name: Extract Release Notes from CHANGELOG
        run: |
          RAW_VERSION="${{ github.event.inputs.version }}"
          VERSION_NAME=$(echo "$RAW_VERSION" | sed 's/^[vV]//')
          awk -v ver="$VERSION_NAME" '/^## / { if (p) { exit }; if ($2 == ver) { p=1; next } } p && !/^## / && !/^$/' CHANGELOG.md > current_release_notes.txt

      - name: Create GitHub Release and Upload APKs
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version }}
          body_path: "current_release_notes.txt"
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
