name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version in pubspec.yaml
        run: |
          RAW_VERSION="${{ github.event.inputs.version }}"
          VERSION_NAME=$(echo "$RAW_VERSION" | sed 's/^[vV]//')
          CURRENT_BUILD=$(grep 'version:' pubspec.yaml | sed 's/.*+//')
          NEW_BUILD=$((CURRENT_BUILD + 1))
          NEW_VERSION="$VERSION_NAME+$NEW_BUILD"
          echo "Bumping version to $NEW_VERSION"
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

      - name: Commit and Push Version Bump
        run: |
          git add pubspec.yaml
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): bump version to ${{ github.event.inputs.version }}"
            git push
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Build Release APK
        run: |
          # Use debug signature if secrets are missing, otherwise use release
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "No keystore found, building with debug signature..."
            flutter build apk --debug
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
            echo "storeFile=upload-keystore.jks" > android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
            echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/key.properties
            flutter build apk --release
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body: "Automated release of YouBike Android version ${{ github.event.inputs.version }}"
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
