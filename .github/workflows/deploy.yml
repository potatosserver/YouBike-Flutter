name: Web Compile and Push to Branch

on:
  workflow_dispatch:  # 保留手動單鍵點擊執行按鈕，不需輸入任何變數

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保 Action 有權限可以將編譯產物推送至同 Repo 的 gh-pages 分支 [1.2.1]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate L10n
        run: flutter gen-l10n

      # 使用你原本最熟悉的指令進行 Wasm 編譯 [1.1.5, 1.2.6]
      - name: Build Web Wasm
        run: flutter build web --wasm --release --dart-define=UPDATE_CHANNEL=web

      # 自動將編譯好的網頁推送到同 Repo 的 gh-pages 分支 [1.2.1]
      - name: Push Web Build to gh-pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web    # 要上傳的編譯產物資料夾 [1.2.1]
          branch: gh-pages     # 你的目標分支（機器人會自動維護與更新此分支）
          clean: true          # 自動清理舊檔案，保持分支乾淨
