name: Generate Taiwan Map Tiles

on:
  schedule:
    - cron: '0 0 * * 0' # 每週日執行
  workflow_dispatch:     # 讓你隨時可以手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and Build
        run: |
          wget https://download.geofabrik.de/asia/taiwan-latest.osm.pbf
          wget https://github.com/onthegomap/planetiler/releases/latest/download/planetiler.jar
          java -Xmx4g -jar planetiler.jar --osm-path=taiwan-latest.osm.pbf --output=taiwan.pmtiles

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: taiwan-map-tiles
          path: taiwan.pmtiles
          retention-days: 7 # 設定 7 天後自動刪除
