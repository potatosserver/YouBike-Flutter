name: Build and Test APK

on:
  workflow_dispatch:
    inputs:
      update_channel:
        description: 'Select the UPDATE_CHANNEL for the build.'
        required: true
        default: 'github'
        type: choice
        options:
          - github
          - google_play
          - web
          - test
      flavor:
        description: 'Select the Android flavor to build.'
        required: true
        default: 'github'
        type: choice
        options:
          - github
          - google_play

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter gen-l10n

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
        run: echo "${GOOGLE_SERVICES_BASE64}" | base64 --decode > android/app/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 --decode > android/upload-keystore.jks
          echo "storeFile=upload-keystore.jks" > android/key.properties
          echo "keyAlias=${KEY_ALIAS}" >> android/key.properties
          echo "keyPassword=${KEY_PASSWORD}" >> android/key.properties
          echo "storePassword=${STORE_PASSWORD}" >> android/key.properties

      - name: Build APK
        run: |
          CHANNEL="${{ github.event.inputs.update_channel }}"
          FLAVOR="${{ github.event.inputs.flavor }}"

          flutter build apk --flavor $FLAVOR --split-per-abi --obfuscate --split-debug-info=./build/app/outputs/debug-info --dart-define=UPDATE_CHANNEL=$CHANNEL

      - name: Upload Test APKs
        uses: actions/upload-artifact@v7
        with:
          name: Test-APKs
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7