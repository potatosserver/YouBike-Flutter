<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="YouBike-Android Vector Map Web">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="youbike_android">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>YouBike</title>
  <link rel="manifest" href="manifest.json">

  <!-- MapLibre GL JS CSS -->
  <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    body {
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .logo-circle {
      width: 110px;
      height: 110px;
      background-color: #FF9800;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 15px 35px rgba(255, 152, 0, 0.3);
      animation: pulse 1.5s infinite ease-in-out;
    }
    .logo-icon {
      color: white;
      font-size: 45px;
      font-style: normal;
    }
    .brand-text {
      margin-top: 35px;
      font-size: 26px;
      font-weight: 600;
      color: #333;
      letter-spacing: 1px;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .flutter-loaded #loading-screen {
      display: none;
    }
  </style>
</head>
<body>
  <!-- MapLibre GL JS -->
  <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
  
  <div id="loading-screen">
    <div class="logo-circle">
      <span class="logo-icon">🚲</span>
    </div>
    <div class="brand-text">YouBike</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', () => {
      document.body.classList.add('flutter-loaded');
    });
  </script>
</body>
</html>
